<svg width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 화살표 마커 정의 -->
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#999" />
    </marker>

    <!-- 그림자 효과 -->
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2" />
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="800" height="200" fill="#f8f9ff" />

  <!-- 1단계: 기획 -->
  <g>
    <!-- 둥근 사각형 -->
    <rect x="20" y="40" width="100" height="80" rx="12" ry="12" fill="#FFB3D9" stroke="#FF88B8" stroke-width="2" filter="url(#shadow)" />
    <!-- 텍스트 -->
    <text x="70" y="72" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">기획</text>
    <text x="70" y="92" font-size="11" text-anchor="middle" fill="#666">Planning</text>
  </g>

  <!-- 화살표 1 -->
  <line x1="120" y1="80" x2="150" y2="80" stroke="#999" stroke-width="2" marker-end="url(#arrowhead)" />

  <!-- 2단계: 제작 -->
  <g>
    <rect x="150" y="40" width="100" height="80" rx="12" ry="12" fill="#B3D9FF" stroke="#88C4FF" stroke-width="2" filter="url(#shadow)" />
    <text x="200" y="72" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">제작</text>
    <text x="200" y="92" font-size="11" text-anchor="middle" fill="#666">Production</text>
  </g>

  <!-- 화살표 2 -->
  <line x1="250" y1="80" x2="280" y2="80" stroke="#999" stroke-width="2" marker-end="url(#arrowhead)" />

  <!-- 3단계: 검토 -->
  <g>
    <rect x="280" y="40" width="100" height="80" rx="12" ry="12" fill="#FFFAB3" stroke="#FFED88" stroke-width="2" filter="url(#shadow)" />
    <text x="330" y="72" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">검토</text>
    <text x="330" y="92" font-size="11" text-anchor="middle" fill="#666">Review</text>
  </g>

  <!-- 화살표 3 -->
  <line x1="380" y1="80" x2="410" y2="80" stroke="#999" stroke-width="2" marker-end="url(#arrowhead)" />

  <!-- 4단계: 배포 -->
  <g>
    <rect x="410" y="40" width="100" height="80" rx="12" ry="12" fill="#B3FFB3" stroke="#88FF88" stroke-width="2" filter="url(#shadow)" />
    <text x="460" y="72" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">배포</text>
    <text x="460" y="92" font-size="11" text-anchor="middle" fill="#666">Deployment</text>
  </g>

  <!-- 화살표 4 -->
  <line x1="510" y1="80" x2="540" y2="80" stroke="#999" stroke-width="2" marker-end="url(#arrowhead)" />

  <!-- 5단계: 분석 -->
  <g>
    <rect x="540" y="40" width="100" height="80" rx="12" ry="12" fill="#D9B3FF" stroke="#C488FF" stroke-width="2" filter="url(#shadow)" />
    <text x="590" y="72" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">분석</text>
    <text x="590" y="92" font-size="11" text-anchor="middle" fill="#666">Analysis</text>
  </g>

  <!-- 피드백 화살표 (5단계에서 1단계로) -->
  <defs>
    <marker id="arrowhead-feedback" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#CCC" />
    </marker>
  </defs>
  <path d="M 590 120 Q 300 160 70 120" stroke="#CCC" stroke-width="2" fill="none" stroke-dasharray="5,5" marker-end="url(#arrowhead-feedback)" />
  <text x="300" y="155" font-size="10" text-anchor="middle" fill="#999">피드백</text>

</svg>