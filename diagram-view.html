<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>업무 프로세스</title>
    <style>
        :root {
            --card-bg: rgba(255, 255, 255, 0.95);
            --card-border: rgba(255, 255, 255, 0.4);
            --accent: #4CAF50;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            --bg-primary: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #666;
        }

        html.dark-mode {
            --bg-primary: #0f0f23;
            --card-bg: rgba(30, 30, 50, 0.7);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-primary: #e0e0e0;
            --text-secondary: #b0b0b0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #4facfe 75%, #00f2fe 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            color: var(--text-primary);
            padding: 24px;
            min-height: 100vh;
            transition: background 0.3s ease;
        }

        html.dark-mode body {
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 25%, #2d1b4e 50%, #1a2a4e 75%, #0f1f3e 100%);
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @media (max-width: 768px) {
            body {
                padding: 16px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 12px;
            }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .header-content h1 {
            font-size: 28px;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .header-content p {
            color: var(--text-secondary);
            font-size: 13px;
        }

        /* 네비게이션 */
        .nav {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            box-shadow: var(--shadow);
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            overflow-x: auto;
        }

        .nav-btn {
            padding: 10px 16px;
            border: 1px solid transparent;
            border-radius: 8px;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            white-space: nowrap;
            min-height: 44px;
        }

        .nav-btn:hover {
            background: rgba(76, 175, 80, 0.1);
            color: var(--text-primary);
        }

        .nav-btn.active {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            border-color: #4CAF50;
        }

        @media (max-width: 768px) {
            .nav {
                padding: 10px;
                margin-bottom: 16px;
            }

            .nav-btn {
                padding: 8px 12px;
                font-size: 12px;
            }

            .header-content h1 {
                font-size: 22px;
            }
        }

        @media (max-width: 480px) {
            .nav {
                padding: 8px;
                gap: 6px;
            }

            .nav-btn {
                padding: 8px 10px;
                font-size: 11px;
            }

            .header-content h1 {
                font-size: 18px;
            }

            .theme-toggle-label {
                display: none;
            }
        }

        .theme-toggle {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 10px 16px;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s ease;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 8px;
            min-height: 44px;
        }

        .theme-toggle:hover {
            transform: translateY(-2px);
        }

        .theme-toggle-label {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 24px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
        }

        .diagram-container {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .diagram-container svg {
            width: 100%;
            height: auto;
            max-width: 100%;
        }

        @media (max-width: 768px) {
            .card {
                padding: 16px;
            }
        }

        @media (max-width: 480px) {
            .card {
                padding: 12px;
                border-radius: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 네비게이션 -->
        <div class="nav">
            <a href="dashboard.html" class="nav-btn">📊 대시보드</a>
            <a href="inventory.html" class="nav-btn">📦 인벤토리</a>
            <a href="orders.html" class="nav-btn">🛒 주문 관리</a>
            <a href="meeting-result.html" class="nav-btn">📋 회의록</a>
            <a href="chart.html" class="nav-btn">📈 매출 현황</a>
            <a href="diagram-view.html" class="nav-btn active">📌 업무 프로세스</a>
            <a href="report.html" class="nav-btn">📝 사이트 분석</a>
        </div>

        <!-- 헤더 -->
        <div class="header">
            <div class="header-content">
                <h1>📌 업무 프로세스</h1>
                <p>마케팅팀 업무 흐름 다이어그램</p>
            </div>
            <button class="theme-toggle" id="themeToggle" title="테마 전환">
                <span id="themeIcon">🌙</span>
                <span class="theme-toggle-label">다크모드</span>
            </button>
        </div>

        <!-- 다이어그램 -->
        <div class="card">
            <div class="diagram-container">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300">
                    <!-- 배경 -->
                    <rect width="1000" height="300" fill="none"/>

                    <!-- 단계 1: 기획 -->
                    <rect x="20" y="100" width="140" height="100" rx="10" fill="#667eea" stroke="#4CAF50" stroke-width="2"/>
                    <text x="90" y="145" text-anchor="middle" fill="white" font-weight="bold" font-size="16">1. 기획</text>
                    <text x="90" y="165" text-anchor="middle" fill="white" font-size="12">전략 수립</text>

                    <!-- 화살표 1 -->
                    <path d="M 160 150 L 200 150" stroke="#4CAF50" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

                    <!-- 단계 2: 제작 -->
                    <rect x="200" y="100" width="140" height="100" rx="10" fill="#764ba2" stroke="#4CAF50" stroke-width="2"/>
                    <text x="270" y="145" text-anchor="middle" fill="white" font-weight="bold" font-size="16">2. 제작</text>
                    <text x="270" y="165" text-anchor="middle" fill="white" font-size="12">콘텐츠 생성</text>

                    <!-- 화살표 2 -->
                    <path d="M 340 150 L 380 150" stroke="#4CAF50" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

                    <!-- 단계 3: 검토 -->
                    <rect x="380" y="100" width="140" height="100" rx="10" fill="#f093fb" stroke="#4CAF50" stroke-width="2"/>
                    <text x="450" y="145" text-anchor="middle" fill="white" font-weight="bold" font-size="16">3. 검토</text>
                    <text x="450" y="165" text-anchor="middle" fill="white" font-size="12">품질 확보</text>

                    <!-- 화살표 3 -->
                    <path d="M 520 150 L 560 150" stroke="#4CAF50" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

                    <!-- 단계 4: 배포 -->
                    <rect x="560" y="100" width="140" height="100" rx="10" fill="#4facfe" stroke="#4CAF50" stroke-width="2"/>
                    <text x="630" y="145" text-anchor="middle" fill="white" font-weight="bold" font-size="16">4. 배포</text>
                    <text x="630" y="165" text-anchor="middle" fill="white" font-size="12">채널 배포</text>

                    <!-- 화stallback 화살표 -->
                    <path d="M 630 200 Q 630 260 630 260 Q 450 260 450 200" stroke="#FF6B6B" stroke-width="2" fill="none" stroke-dasharray="5,5" marker-end="url(#arrowhead-red)"/>
                    <text x="540" y="280" text-anchor="middle" fill="#FF6B6B" font-size="12" font-weight="bold">피드백 루프</text>

                    <!-- 단계 5: 분석 -->
                    <rect x="740" y="100" width="140" height="100" rx="10" fill="#00f2fe" stroke="#4CAF50" stroke-width="2"/>
                    <text x="810" y="145" text-anchor="middle" fill="white" font-weight="bold" font-size="16">5. 분석</text>
                    <text x="810" y="165" text-anchor="middle" fill="white" font-size="12">성과 측정</text>

                    <!-- 화살표 정의 -->
                    <defs>
                        <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
                            <polygon points="0 0, 10 3, 0 6" fill="#4CAF50"/>
                        </marker>
                        <marker id="arrowhead-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
                            <polygon points="0 0, 10 3, 0 6" fill="#FF6B6B"/>
                        </marker>
                    </defs>
                </svg>
            </div>
        </div>
    </div>

    <script>
        // 다크모드 토글
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const html = document.documentElement;

        function loadTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            if (savedTheme === 'dark') {
                html.classList.add('dark-mode');
                themeIcon.textContent = '☀️';
                themeToggle.querySelector('.theme-toggle-label').textContent = '라이트모드';
            }
        }

        function toggleTheme() {
            if (html.classList.contains('dark-mode')) {
                html.classList.remove('dark-mode');
                localStorage.setItem('theme', 'light');
                themeIcon.textContent = '🌙';
                themeToggle.querySelector('.theme-toggle-label').textContent = '다크모드';
            } else {
                html.classList.add('dark-mode');
                localStorage.setItem('theme', 'dark');
                themeIcon.textContent = '☀️';
                themeToggle.querySelector('.theme-toggle-label').textContent = '라이트모드';
            }
        }

        loadTheme();
        themeToggle.addEventListener('click', toggleTheme);
    </script>
</body>
</html>
